name: Format & Lint Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fmt-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Setup direnv or nix profile for statix, deadnix, nixfmt
      - name: Install Linting Tools
        run: nix profile install nixpkgs#statix nixpkgs#deadnix nixpkgs#nixfmt-rfc-style

      - name: Run statix
        run: statix check .

      - name: Run deadnix
        run: deadnix --fail .

      - name: Run nixfmt
        run: nixfmt --check **/*.nix
