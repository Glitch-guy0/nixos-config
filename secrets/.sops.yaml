# ============================================================
# PURPOSE:   Declares which age keys decrypt which secret files.
# AGENT:     When adding a new host:
#              1. scripts/hosts/gen-age-key.sh <hostname>
#              2. Add pubkey under keys.hosts.<hostname>
#              3. Add creation_rules entry for secrets/hosts/<hostname>.yaml
#              4. scripts/sops/rekey-all.sh
#            When adding a new user, same pattern under keys.users.<username>.
# ============================================================

keys:
  hosts:
    unknown:  &unknown  "age1placeholderunknownpubkey1234567890abcdefghijklmnopqrstuvwx"
  users:
    glitch:   &glitch   "age1placeholderglitchpubkey1234567890abcdefghijklmnopqrstuvwx"
  admin:     &admin   "age1placeholderadminpubkey1234567890abcdefghijklmnopqrstuvwx"

creation_rules:
  - path_regex: secrets/hosts/unknown\.yaml$
    key_groups:
      - age: [*unknown, *admin]

  - path_regex: secrets/users/glitch\.yaml$
    key_groups:
      - age: [*glitch, *admin]

  - path_regex: secrets/shared/.*\.yaml$
    key_groups:
      - age: [*unknown, *admin]
